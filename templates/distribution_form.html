{% extends "base.html" %}
{% block title %}{{ 'Edit' if distribution else 'Log' }} Distribution - Turo Tracker{% endblock %}
{% block content %}

<h2>{{ 'Edit' if distribution else 'Log' }} Distribution</h2>
<p class="subtitle" style="margin-top:-4px;">
  A cash draw paid out to a partner, separate from expenses or a payback.
</p>

<form method="POST" class="form">
  <label>Date *
    <input type="date" name="date" required value="{{ distribution.date if distribution else today }}">
  </label>

  <label>Partner *
    <select name="user_id" required>
      {% for user in users %}
        <option value="{{ user.id }}" {{ 'selected' if distribution and distribution.user_id == user.id }}>{{ user.display_name or user.username }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Amount ($) *
    <input type="number" step="0.01" min="0" name="amount" required value="{{ distribution.amount if distribution else '' }}">
  </label>

  <label>Notes
    <textarea name="notes" rows="3" placeholder="Optional details">{{ distribution.notes if distribution else '' }}</textarea>
  </label>

  <div class="form-actions">
    <button type="submit" class="btn">{{ 'Save Changes' if distribution else 'Log Distribution' }}</button>
    <a href="{{ url_for('distributions') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>

{% endblock %}
